<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Webmint Studio</title>
<style>
  :root{
    --ink:#12100E; --paper:#FAF7F2;
    --plum-deep:#170D22; --plum-card:#20132E;
    --gold:#E8B04B; --gold-soft:#F3D48A;
    --clay:#C4573D; --mint:#8FBF9F;
    --line: rgba(250,247,242,0.14);
    --display: "Fraunces", "Georgia", serif;
    --body: "Inter", -apple-system, sans-serif;
    --mono: "JetBrains Mono", monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--plum-deep);color:var(--paper);font-family:var(--body);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{max-width:520px;width:100%;background:rgba(255,255,255,0.03);border:1.5px solid rgba(232,176,75,0.35);
    border-radius:22px;padding:48px 40px;text-align:center;}
  .icon{width:72px;height:72px;border-radius:50%;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;}
  .icon.ok{background:rgba(143,191,159,0.15);border:2px solid var(--mint);}
  .icon.fail{background:rgba(196,87,61,0.15);border:2px solid var(--clay);}
  .icon.wait{background:rgba(232,176,75,0.15);border:2px solid var(--gold);}
  h1{font-family:var(--display);font-size:1.6rem;font-weight:600;margin-bottom:12px;}
  p{color:rgba(250,247,242,0.65);line-height:1.6;margin-bottom:28px;}
  .download-btn{display:inline-flex;align-items:center;gap:10px;background:var(--gold);color:var(--plum-deep);
    font-weight:700;padding:17px 36px;border-radius:100px;font-size:0.95rem;transition:transform .3s ease;}
  .download-btn:hover{transform:translateY(-2px);}
  .download-btn.disabled{opacity:0.5;pointer-events:none;}
  .spinner{width:20px;height:20px;border:3px solid rgba(250,247,242,0.2);border-top-color:var(--gold);border-radius:50%;
    animation:spin .8s linear infinite;margin:0 auto;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .support{margin-top:24px;font-family:var(--mono);font-size:0.75rem;color:rgba(250,247,242,0.4);}
  .support a{color:var(--gold-soft);}
</style>
</head>
<body>

<div class="card" id="card">
  <div class="icon wait"><div class="spinner"></div></div>
  <h1>Confirming your payment…</h1>
  <p>Please wait a moment while we verify your transaction with Cashfree. Do not close this page.</p>
</div>

<script>
  // Set this once your product file has real, permanent hosting.
  // It is never trusted from the browser — the actual link only ever comes from
  // the server's /api/verify-order response, and only when the order is PAID.
  const WHATSAPP_NUMBER = "918092926839";

  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('order_id') || sessionStorage.getItem('cf_order_id');
  const card = document.getElementById('card');

  function render(iconClass, title, desc, extraHtml){
    card.innerHTML = `
      <div class="icon ${iconClass}">${iconClass === 'ok'
        ? '<svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="var(--mint)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        : '<svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M12 9v4M12 17h.01" stroke="var(--clay)" stroke-width="2.4" stroke-linecap="round"/></svg>'}</div>
      <h1>${title}</h1>
      <p>${desc}</p>
      ${extraHtml || ''}
      <div class="support">Need help? <a href="https://wa.me/${WHATSAPP_NUMBER}" target="_blank">Message us on WhatsApp</a></div>
    `;
  }

  async function verify(){
    if(!orderId){
      render('fail', 'No order found', 'We could not find your order details. If you completed a payment, please contact support with your payment reference.');
      return;
    }
    try {
      const res = await fetch(`/api/verify-order?order_id=${encodeURIComponent(orderId)}`);
      const data = await res.json();

      if(data.paid){
        const linkHtml = data.download_link
          ? `<a href="${data.download_link}" class="download-btn" target="_blank">Download Your Bundle</a>`
          : `<a href="#" class="download-btn disabled">Preparing your download…</a><p style="margin-top:16px;font-size:0.82rem;">Your payment is confirmed — the download link will also be emailed to you shortly.</p>`;
        render('ok', 'Payment successful!', 'Thank you for your purchase. Your download is ready below.', linkHtml);
      } else if(data.status === 'ACTIVE'){
        // Payment still pending/processing — check again shortly
        setTimeout(verify, 3000);
      } else {
        render('fail', 'Payment not completed', `Order status: ${data.status || 'unknown'}. If money was deducted, it will be auto-refunded, or contact support.`);
      }
    } catch(err){
      render('fail', 'Could not verify payment', 'Something went wrong while checking your payment status. Please contact support with your order ID: ' + orderId);
    }
  }

  verify();
</script>

</body>
</html>
